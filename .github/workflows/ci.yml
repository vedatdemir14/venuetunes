name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Faz 0'da workspace kurulunca aktifleşecek:
      # - run: pnpm install --frozen-lockfile
      # - run: pnpm lint
      # - run: pnpm test
      # - run: pnpm build
      - run: echo "Workspace kurulumu bekleniyor (Faz 0)"
